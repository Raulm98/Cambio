<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio Online - Juego de Cartas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card p-4 shadow">
            <h2 class="text-center mb-4">¡Bienvenidos a CAMBIO!</h2>
            <input type="text" id="username" class="form-control mb-3" placeholder="Tu nombre">
            <input type="text" id="room" class="form-control mb-3" placeholder="Código de Sala (ej: amigos123)">
            <button class="btn btn-success w-100" onclick="joinGame()">Entrar a Jugar</button>
        </div>
    </div>
</div>

<div id="game-table" class="d-none">
    <div class="status-bar d-flex justify-content-between p-2 bg-dark text-white">
        <span id="player-info">Jugador: -</span>
        <span id="turn-indicator" class="badge bg-warning text-dark">Esperando jugadores...</span>
        <button class="btn btn-danger btn-sm" id="btn-cambio" onclick="callCambio()">¡CAMBIO!</button>
    </div>

    <div class="table-surface">
        <!-- Oponentes -->
        <div id="opponents-container" class="d-flex justify-content-around p-3"></div>

        <!-- Centro: Mazo y Descarte -->
        <div class="center-decks">
            <div class="deck-container text-center">
                <small>MAZO</small>
                <div id="main-deck" class="card-sprite back" onclick="drawFromDeck()"></div>
            </div>
            <div class="deck-container text-center">
                <small>DESCARTE</small>
                <div id="discard-pile" class="card-sprite" onclick="discardAction()"></div>
            </div>
        </div>

        <!-- Mi Mano -->
        <div class="my-hand-container">
            <h5 class="text-center text-white-50">Tu Mano</h5>
            <div id="my-cards" class="d-flex justify-content-center gap-2"></div>
        </div>
    </div>
</div>

<!-- Modal para ver cartas (Poderes 8 y 9) -->
<div id="power-modal" class="power-overlay d-none">
    <div class="power-content text-center text-white">
        <h3 id="power-title">Usando Poder</h3>
        <div id="power-card-view" class="card-sprite mx-auto my-4"></div>
        <p>Tiempo restante: <span id="power-timer">20</span>s</p>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
